<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Genesis - The Infomatter Theory</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #narrative {
            position: absolute; top: 80px; left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px; line-height: 1.6;
            max-width: 400px; z-index: 50;
            pointer-events: none; transition: opacity 1.5s ease;
        }
        
        #hud {
            position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.4);
            font-size: 12px; z-index: 10; pointer-events: none;
        }
        
        #zoomBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0.8);
            width: 70px; height: 70px; border-radius: 50%;
            background: #FFF; color: #000; border: none;
            font-size: 50px; line-height: 80px; text-align: center;
            cursor: pointer; z-index: 100;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: flex; justify-content: center; align-items: center;
        }
        #zoomBtn.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) scale(1); }
        #zoomBtn span { margin-top: 15px; }
    </style>
</head>
<body>
    <div id="hud">SYSTEM_STATE: <span id="lvlDisplay">0</span></div>
    <div id="narrative"></div>
    <div id="zoomBtn"><span>*</span></div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoomBtn = document.getElementById('zoomBtn');
const lvlDisplay = document.getElementById('lvlDisplay');
const narrative = document.getElementById('narrative');

const texts = [
    "Il vuoto è una tela senza limiti. Non c'è materia, non c'è tempo. Solo la tua capacità di osservare. Traccia un segno nel nulla: il primo passo è dichiarare l'esistenza.",
    "La vibrazione inizia. I primi pensieri prendono forma: punti isolati in un oceano di silenzio. Ogni punto è un'infomateria che si dichiara reale, un'intenzione che cerca un senso.",
    "L'isolamento è superato. I punti si attraggono, riconoscendosi. Si formano i primi cluster: aggregati di intenti. Pensieri complessi che iniziano a dialogare, creando una rete di senso solida.",
    "La complessità aumenta. I gruppi si chiudono in mondi, sistemi ricorsivi che imitano il Tutto. Sei una mente che osserva un pensiero, che a sua volta contiene altri pensieri. La realtà si auto-genera.",
    "La forma svanisce, resta l'essenza. I sistemi diventano pura astrazione. Non serve più la struttura, basta il movimento. Tutto è pensiero che percepisce se stesso come materia, in un riflesso infinito."
];

function updateNarrative(lvl) {
    if (lvl < texts.length) {
        narrative.style.opacity = 0;
        setTimeout(() => {
            narrative.innerText = texts[lvl];
            narrative.style.opacity = 1;
        }, 1000);
    } else {
        narrative.style.opacity = 0;
    }
}

// ... (Resto del codice di setup: adjustCanvasResolution, etc)
function adjustCanvasResolution() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', adjustCanvasResolution);
adjustCanvasResolution();

// --- STATO E LOGICA (Identica alla versione precedente) ---
let level = 0;
let currentWorld = { entities: [], groups: [] };
let blueprintWorld = null; 
let blueprintRadius = 0;
let isZooming = false;
let zoomProgress = 0;
let targetZoomScale = 1;
let autoZoomingStarted = false;
let isDrawing = false;
let currentPath = [];

// ... (Includi qui le funzioni cloneWorld, getBoundingBox, createGroup, isPointInPolygon, updateWorld, drawWorld come nella versione precedente) ...
// (Per brevità ho omesso la ripetizione delle funzioni standard già consolidate, ma assicurati di mantenerle)

function cloneWorld(world) {
    let newWorld = { entities: [], groups: [] };
    let map = new Map();
    world.entities.forEach(e => {
        let newE;
        if (e.type === 'point') {
            newE = { type: 'point', x: e.x, y: e.y, vx: e.vx, vy: e.vy, birth: Date.now(), baseSize: e.baseSize, size: e.baseSize, lifeSpan: e.lifeSpan };
        } else {
            newE = { type: 'system', x: e.x, y: e.y, vx: e.vx, vy: e.vy, radius: e.radius, innerRadius: e.innerRadius, innerWorld: cloneWorld(e.innerWorld) };
        }
        map.set(e, newE);
        newWorld.entities.push(newE);
    });
    world.groups.forEach(g => {
        let newG = { id: Date.now() + Math.random(), entities: g.entities.map(e => map.get(e)).filter(Boolean), birth: Date.now(), lastReproduction: Date.now(), bubble: { ...g.bubble } };
        newG.entities.forEach(e => e.groupId = newG.id);
        newWorld.groups.push(newG);
    });
    return newWorld;
}

function getBoundingBox(entities) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    entities.forEach(p => { if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x; if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; });
    return (minX === Infinity) ? { cx: 0, cy: 0 } : { cx: (minX + maxX)/2, cy: (minY + maxY)/2 };
}

function createGroup(world, members) {
    const id = Date.now() + Math.random();
    members.forEach(m => m.groupId = id);
    world.groups.push({ id: id, entities: members, birth: Date.now(), lastReproduction: Date.now(), bubble: { x: members[0].x, y: members[0].y, radius: 10, pulse: 0 } });
}

function isPointInPolygon(point, vs) {
    let x = point.x, y = point.y, inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i].x, yi = vs[i].y, xj = vs[j].x, yj = vs[j].y;
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

canvas.addEventListener('touchstart', (e) => {
    if (isZooming || level >= 5) return;
    let t = e.touches[0];
    if (level === 0) {
        currentWorld.entities.push({ type: 'point', x: t.clientX, y: t.clientY, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, birth: Date.now(), baseSize: 2.5, size: 2.5, lifeSpan: 10000 });
        isDrawing = true; currentPath = [{x: t.clientX, y: t.clientY}];
    } else {
        currentWorld.entities.push({ type: 'system', x: t.clientX, y: t.clientY, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2, radius: 40, innerRadius: blueprintRadius, innerWorld: cloneWorld(blueprintWorld) });
    }
});

canvas.addEventListener('touchmove', (e) => { if (isDrawing && level === 0) currentPath.push({x: e.touches[0].clientX, y: e.touches[0].clientY}); });
canvas.addEventListener('touchend', () => {
    isDrawing = false;
    if (level === 0 && currentPath.length > 5) {
        let members = currentWorld.entities.filter(p => !p.groupId && p.type === 'point' && isPointInPolygon(p, currentPath));
        if (members.length > 1) createGroup(currentWorld, members);
    }
    currentPath = [];
});

zoomBtn.addEventListener('click', () => {
    if(isZooming) return;
    isZooming = true; zoomBtn.classList.remove('visible');
    let bbox = getBoundingBox(currentWorld.entities);
    currentWorld.entities.forEach(e => { e.x -= bbox.cx; e.y -= bbox.cy; });
    currentWorld.groups.forEach(g => { g.bubble.x -= bbox.cx; g.bubble.y -= bbox.cy; });

    let maxDist = 0; currentWorld.entities.forEach(e => { let d = Math.hypot(e.x, e.y); if (d > maxDist) maxDist = d; });
    blueprintRadius = maxDist + 50; 

    if (level >= 3) {
        let dots = [];
        for (let i = 0; i < 40; i++) {
            dots.push({ type: 'point', x: (Math.random() - 0.5) * (blueprintRadius * 0.8), y: (Math.random() - 0.5) * (blueprintRadius * 0.8), vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5, birth: Date.now(), baseSize: 2.5, size: 2.5, lifeSpan: Infinity });
        }
        let simplifiedWorld = { entities: dots, groups: [] };
        blueprintWorld = cloneWorld(simplifiedWorld);
        let sys = { type: 'system', x: window.innerWidth / 2, y: window.innerHeight / 2, vx: 0, vy: 0, radius: 40, innerRadius: blueprintRadius, innerWorld: cloneWorld(simplifiedWorld) };
        currentWorld = { entities: [sys], groups: [] };
    } else {
        blueprintWorld = cloneWorld(currentWorld);
        let sys = { type: 'system', x: window.innerWidth / 2, y: window.innerHeight / 2, vx: 0, vy: 0, radius: 40, innerRadius: blueprintRadius, innerWorld: currentWorld };
        currentWorld = { entities: [sys], groups: [] };
    }

    targetZoomScale = currentWorld.entities[0].radius / blueprintRadius;
    level++;
    lvlDisplay.innerText = level;
    updateNarrative(level); // AGGIORNAMENTO TESTO
    zoomProgress = 0;
});

// [Inserisci qui updateWorld e drawWorld dalla versione precedente]
// Nota: è fondamentale inserire qui le funzioni updateWorld e drawWorld che hai già testato.
// Le ho omesse per brevità di output, ma sono necessarie per il funzionamento.

function updateWorld(world, isRoot, bW, bH, bRadius) { /* ... logica esistente ... */ }
function drawWorld(context, world, renderScale) { /* ... logica esistente ... */ }

function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

    if (isZooming) {
        zoomProgress += 0.03;
        let ease = 1 - Math.pow(1 - zoomProgress, 3);
        let currentScale = 1 + ((targetZoomScale - 1) * ease);
        ctx.save();
        ctx.translate(window.innerWidth/2, window.innerHeight/2);
        ctx.scale(currentScale, currentScale);
        ctx.translate(-window.innerWidth/2, -window.innerHeight/2);
        drawWorld(ctx, currentWorld.entities[0].innerWorld, currentScale);
        ctx.restore();
        if (zoomProgress >= 1) { isZooming = false; autoZoomingStarted = false; }
        requestAnimationFrame(animate); return;
    }

    updateWorld(currentWorld, true, window.innerWidth, window.innerHeight, 0);

    let stable = currentWorld.groups.some(g => (Date.now() - g.birth > 12000 && g.entities.length >= 2));
    
    if (level >= 5) {
        if (stable && !autoZoomingStarted) {
            autoZoomingStarted = true;
            setTimeout(() => zoomBtn.click(), 1500);
        } else if (Math.random() < 0.04) { 
            let tx = 40 + Math.random() * (window.innerWidth - 80);
            let ty = 40 + Math.random() * (window.innerHeight - 80);
            currentWorld.entities.push({ type: 'system', x: tx, y: ty, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2, radius: 40, innerRadius: blueprintRadius, innerWorld: cloneWorld(blueprintWorld) });
        }
    } else {
        if (stable && !isZooming) zoomBtn.classList.add('visible');
        else zoomBtn.classList.remove('visible');
    }

    drawWorld(ctx, currentWorld, 1);
    requestAnimationFrame(animate);
}

// Inizializzazione narrativa
updateNarrative(0);
requestAnimationFrame(animate);
</script>
</body>
</html>
