<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Genesis - Infinity</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100%; height: 100%; }

        #narrative {
            position: absolute; top: 80px; left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px; line-height: 1.6;
            max-width: 400px; z-index: 50;
            pointer-events: none; transition: opacity 1.5s ease;
            opacity: 1;
        }
        
        #hud {
            position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.7);
            font-size: 16px; z-index: 10; pointer-events: none;
        }
        #autoPilot { color: #0f0; font-size: 12px; display: none; margin-top: 5px; text-shadow: 0 0 5px #0f0; }
        
        #zoomBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0.8);
            width: 70px; height: 70px; border-radius: 50%;
            background: #FFF; color: #000; border: none;
            font-size: 50px; line-height: 80px; text-align: center;
            cursor: pointer; z-index: 100;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: flex; justify-content: center; align-items: center;
        }
        #zoomBtn.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) scale(1); }
        #zoomBtn span { margin-top: 15px; }
    </style>
</head>
<body>
    <div id="hud">
        ITERAZIONE <span id="lvlDisplay">0</span>
        <div id="autoPilot">▶ AUTOMATICO</div>
    </div>
    <div id="narrative"></div>
    <div id="zoomBtn"><span>*</span></div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoomBtn = document.getElementById('zoomBtn');
const lvlDisplay = document.getElementById('lvlDisplay');
const autoPilotDisplay = document.getElementById('autoPilot');

function adjustCanvasResolution() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', adjustCanvasResolution);
adjustCanvasResolution();

const narrative = document.getElementById('narrative');

// Testi aggiornati per il flusso 0->4
const texts = [
    "Il Nulla è un punto di dimensioni indefinite, infinitamente grande ed infinitamente piccolo. Immagina di essere tu il Nulla: non c'è materia né tempo, ma solo la tua capacità di definire punti strutturalmente identici a te, metterli in relazione, osservarli, unirli, ipotizzare su una tela senza limiti.",
    "I primi pensieri prendono forma, ogni punto è infomateria riconoscibile dagli altri punti e accettata come reale poiché rilevante nelle dinamiche reciproche.",
    "L'isolamento è superato. I punti si attraggono, riconoscendosi. Si formano i primi sistemi osservanti e coscienti. Pensieri complessi che iniziano a dialogare, creando una rete solida.",
    "I sistemi si uniscono in strutture altamente complesse. Sei una mente che osserva un pensiero, che contiene altri pensieri. C'è così tanto caos che ipotesi e potenzialità iniziano a risultare valide quanto qualcosa di reale poiché rilevante nel discernimento della complessità.",
    "La forma svanisce, resta l'essenza. Il sistema è ora autonomo. Tutto è pensiero istanziato e iterato, che percepisce se stesso come materia."
];

function updateNarrative(lvl) {
    if (lvl >= texts.length) {
        narrative.style.opacity = 0;
        return;
    }
    // Fade out (lo rendiamo invisibile)
    narrative.style.opacity = 0;
    
    // Aspettiamo che la transizione finisca (1.5s) per cambiare il testo
    setTimeout(() => {
        narrative.innerText = texts[lvl];
        // Fade in (lo rendiamo visibile)
        narrative.style.opacity = 1;
    }, 1500); 
}

// --- STATO GLOBALE ---
let level = 0;
let currentWorld = { entities: [], groups: [] };
let blueprintWorld = null; 
let blueprintRadius = 0;

let isDrawing = false;
let currentPath = [];
let isZooming = false;
let zoomProgress = 0;
let targetZoomScale = 1;
let autoZoomingStarted = false;

// --- UTILITY E CLONAZIONE ---
function cloneWorld(world) {
    let newWorld = { entities: [], groups: [] };
    let map = new Map();

    world.entities.forEach(e => {
        let newE;
        if (e.type === 'point') {
            newE = { type: 'point', x: e.x, y: e.y, vx: e.vx, vy: e.vy, birth: Date.now(), baseSize: e.baseSize, size: e.baseSize, lifeSpan: e.lifeSpan };
        } else {
            newE = { type: 'system', x: e.x, y: e.y, vx: e.vx, vy: e.vy, radius: e.radius, innerRadius: e.innerRadius, innerWorld: cloneWorld(e.innerWorld) };
        }
        map.set(e, newE);
        newWorld.entities.push(newE);
    });

    world.groups.forEach(g => {
        let newG = {
            id: Date.now() + Math.random(),
            entities: g.entities.map(e => map.get(e)).filter(Boolean),
            birth: Date.now(), lastReproduction: Date.now(),
            bubble: { ...g.bubble }
        };
        newG.entities.forEach(e => e.groupId = newG.id);
        newWorld.groups.push(newG);
    });
    return newWorld;
}

function getBoundingBox(entities) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    entities.forEach(p => {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
    });
    if(minX === Infinity) return { minX:0, maxX:0, minY:0, maxY:0, cx:0, cy:0 };
    return { minX, maxX, minY, maxY, cx: (minX + maxX)/2, cy: (minY + maxY)/2 };
}

// --- INTERAZIONE MANUALE ---
canvas.addEventListener('touchstart', (e) => {
    if (isZooming || level >= 4) return; // Disabilita input manuale quando c'è l'autopilota
    let t = e.touches[0];
    
    if (level === 0) {
        currentWorld.entities.push({ type: 'point', x: t.clientX, y: t.clientY, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, birth: Date.now(), baseSize: 2.5, size: 2.5, lifeSpan: 10000 });
        isDrawing = true;
        currentPath = [{x: t.clientX, y: t.clientY}];
    } else {
        currentWorld.entities.push({
            type: 'system', x: t.clientX, y: t.clientY,
            vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2,
            radius: 40, innerRadius: blueprintRadius,
            innerWorld: cloneWorld(blueprintWorld)
        });
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (isDrawing && level === 0) currentPath.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
});

canvas.addEventListener('touchend', () => {
    isDrawing = false;
    if (level === 0 && currentPath.length > 5) {
        let members = currentWorld.entities.filter(p => !p.groupId && p.type === 'point' && isPointInPolygon(p, currentPath));
        if (members.length > 1) createGroup(currentWorld, members);
    }
    currentPath = [];
});

function createGroup(world, members) {
    const id = Date.now() + Math.random();
    members.forEach(m => m.groupId = id);
    world.groups.push({
        id: id, entities: members, birth: Date.now(), lastReproduction: Date.now(),
        bubble: { x: members[0].x, y: members[0].y, radius: 10, pulse: 0 }
    });
}

function isPointInPolygon(point, vs) {
    let x = point.x, y = point.y, inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i].x, yi = vs[i].y, xj = vs[j].x, yj = vs[j].y;
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

// --- LOGICA ZOOM E RICORSIONE/SEMPLIFICAZIONE ---
zoomBtn.addEventListener('click', () => {
    if(isZooming) return;
    isZooming = true;
    zoomBtn.classList.remove('visible');

    let bbox = getBoundingBox(currentWorld.entities);
    currentWorld.entities.forEach(e => { e.x -= bbox.cx; e.y -= bbox.cy; });
    currentWorld.groups.forEach(g => { g.bubble.x -= bbox.cx; g.bubble.y -= bbox.cy; });

    let maxDist = 0;
    currentWorld.entities.forEach(e => {
        let d = Math.hypot(e.x, e.y);
        if (d > maxDist) maxDist = d;
    });
    blueprintRadius = maxDist + 50; 
    
    // SEMPLIFICAZIONE A PARTIRE DAL LIVELLO 3 (Per il livello 4+)
    if (level >= 1) {
        let dots = [];
        for (let i = 0; i < 40; i++) {
            // Crea puntini "eterni" per simulare rumore bianco interno
            dots.push({
                type: 'point',
                x: (Math.random() - 0.5) * (blueprintRadius * 0.8),
                y: (Math.random() - 0.5) * (blueprintRadius * 0.8),
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                birth: Date.now(), baseSize: 2.5, size: 2.5, lifeSpan: Infinity
            });
        }
        let simplifiedWorld = { entities: dots, groups: [] };
        
        blueprintWorld = cloneWorld(simplifiedWorld);
        let sys = {
            type: 'system', x: window.innerWidth / 2, y: window.innerHeight / 2,
            vx: 0, vy: 0, radius: 40, innerRadius: blueprintRadius,
            innerWorld: cloneWorld(simplifiedWorld)
        };
        currentWorld = { entities: [sys], groups: [] };
    } else {
        // Comportamento standard ricorsivo
        blueprintWorld = cloneWorld(currentWorld);
        let sys = {
            type: 'system', x: window.innerWidth / 2, y: window.innerHeight / 2,
            vx: 0, vy: 0, radius: 40, innerRadius: blueprintRadius,
            innerWorld: currentWorld
        };
        currentWorld = { entities: [sys], groups: [] };
    }

    targetZoomScale = currentWorld.entities[0].radius / blueprintRadius;
    level++;
    zoomProgress = 0;
    lvlDisplay.innerText = level;

    // AGGIUNGI QUESTA RIGA PER AGGIORNARE IL TESTO AL CAMBIO LIVELLO
    updateNarrative(level);

    if(level >3) autoPilotDisplay.style.display = 'block';
});

// --- MOTORE FISICO ---
function updateWorld(world, isRoot, bW, bH, bRadius) {
    if (isRoot && level > 0 && Math.random() < 0.1) {
        let freeSystems = world.entities.filter(e => e.type === 'system' && !e.groupId);
        for(let i = 0; i < freeSystems.length; i++) {
            for(let j = i+1; j < freeSystems.length; j++) {
                if (Math.hypot(freeSystems[i].x - freeSystems[j].x, freeSystems[i].y - freeSystems[j].y) < 120) {
                    createGroup(world, [freeSystems[i], freeSystems[j]]); break;
                }
            }
        }
    }

    world.entities = world.entities.filter(e => {
        e.x += e.vx; e.y += e.vy;
        
        if (isRoot) {
            if(e.x < 10 || e.x > bW - 10) e.vx *= -1;
            if(e.y < 10 || e.y > bH - 10) e.vy *= -1;
        } else {
            let dist = Math.hypot(e.x, e.y);
            if (dist > bRadius - 5) {
                let angle = Math.atan2(e.y, e.x);
                let speed = Math.hypot(e.vx, e.vy);
                e.vx = -Math.cos(angle) * speed; e.vy = -Math.sin(angle) * speed;
            }
        }

        if (e.type === 'point') {
            if (e.lifeSpan === Infinity) return true; // I punti semplificati non muoiono
            let life = 1 - ((Date.now() - e.birth) / e.lifeSpan);
            e.size = Math.max(0, e.baseSize * life);
            return e.size > 0;
        } else {
            updateWorld(e.innerWorld, false, 0, 0, e.innerRadius);
            if (e.innerWorld.entities.length === 0) e.radius -= 0.5;
            return e.radius > 0;
        }
    });

    world.groups = world.groups.filter(g => {
        g.entities = g.entities.filter(e => (e.type === 'point' ? e.size > 0 : e.radius > 0));
        if (g.entities.length === 0) return false;

        let repTime = 3000 + (g.entities.length * 150);
        if (Date.now() - g.lastReproduction > repTime) {
            let angle = Math.random() * Math.PI * 2;
            let sx = g.bubble.x + Math.cos(angle)*(g.bubble.radius + 15);
            let sy = g.bubble.y + Math.sin(angle)*(g.bubble.radius + 15);
            
            let newEnt = level === 0 || !isRoot
                ? { type: 'point', x: sx, y: sy, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, birth: Date.now(), baseSize: 2.5, size: 2.5, lifeSpan: 10000 }
                : { type: 'system', x: sx, y: sy, vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.2, radius: 40, innerRadius: blueprintRadius, innerWorld: cloneWorld(blueprintWorld) };
            
            newEnt.groupId = g.id;
            world.entities.push(newEnt);
            g.entities.push(newEnt);
            g.lastReproduction = Date.now();
        }
        return true;
    });
}

// --- RENDER ---
function drawWorld(context, world, renderScale) {
    world.groups.forEach(g => {
        context.strokeStyle = `rgba(150, 150, 150, ${Math.min(1, 0.4 * renderScale)})`;
        context.lineWidth = 1 / renderScale;
        context.beginPath();
        let maxLines = Math.min(g.entities.length * 2, 50); 
        for(let k=0; k<maxLines; k++) {
            let i = Math.floor(Math.random() * g.entities.length), j = Math.floor(Math.random() * g.entities.length);
            context.moveTo(g.entities[i].x, g.entities[i].y); context.lineTo(g.entities[j].x, g.entities[j].y);
        }
        context.stroke();

        let bbox = getBoundingBox(g.entities);
        let tr = Math.max(bbox.maxX - bbox.minX, bbox.maxY - bbox.minY) / 2 + (level===0 ? 15 : 25);
        g.bubble.x += (bbox.cx - g.bubble.x) * 0.1; g.bubble.y += (bbox.cy - g.bubble.y) * 0.1;
        g.bubble.radius += (tr - g.bubble.radius) * 0.1;
        g.bubble.pulse = Math.sin(Date.now()/500) * (g.entities.length * 0.3);

        context.strokeStyle = `rgba(255, 255, 255, ${Math.min(1, 0.6 * renderScale)})`;
        context.lineWidth = 1.5 / renderScale;
        context.beginPath();
        context.arc(g.bubble.x, g.bubble.y, Math.max(5, g.bubble.radius + g.bubble.pulse), 0, Math.PI*2);
        context.stroke();
    });

    world.entities.forEach(e => {
        if (e.type === 'point') {
            context.fillStyle = '#FFF';
            context.beginPath(); context.arc(e.x, e.y, e.size, 0, Math.PI*2); context.fill();
        } else {
            context.strokeStyle = 'rgba(255,255,255,0.9)';
            context.lineWidth = 2 / renderScale;
            context.beginPath(); context.arc(e.x, e.y, e.radius, 0, Math.PI*2); context.stroke();

            context.save();
            context.translate(e.x, e.y);
            context.beginPath(); context.arc(0, 0, e.radius, 0, Math.PI*2); context.clip();
            context.fillStyle = '#050505'; context.fill();

            let innerScale = e.radius / e.innerRadius;
            context.scale(innerScale, innerScale);
            drawWorld(context, e.innerWorld, renderScale * innerScale);
            context.restore();
        }
    });
}

function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

    if (isZooming) {
        zoomProgress += 0.03;
        let ease = 1 - Math.pow(1 - zoomProgress, 3);
        let currentScale = 1 + ((targetZoomScale - 1) * ease);

        ctx.save();
        ctx.translate(window.innerWidth/2, window.innerHeight/2);
        ctx.scale(currentScale, currentScale);
        ctx.translate(-window.innerWidth/2, -window.innerHeight/2);
        drawWorld(ctx, currentWorld.entities[0].innerWorld, currentScale);
        ctx.restore();

        if (zoomProgress >= 1) {
            isZooming = false;
            autoZoomingStarted = false;
        }
        requestAnimationFrame(animate); return;
    }

    updateWorld(currentWorld, true, window.innerWidth, window.innerHeight, 0);

    let stable = currentWorld.groups.some(g => (Date.now() - g.birth > 12000 && g.entities.length >= 2));
    
    // --- GESTIONE AUTOPILOTA (Livello 4+) ---
    if (level >= 4) {
        if (stable) {
            if (!autoZoomingStarted) {
                autoZoomingStarted = true;
                setTimeout(() => zoomBtn.click(), 1500); // Zoom automatico ritardato per godersi la vista
            }
        } else if (Math.random() < 0.04) { 
            // Tap automatici sparsi nello schermo
            let tx = 40 + Math.random() * (window.innerWidth - 80);
            let ty = 40 + Math.random() * (window.innerHeight - 80);
            currentWorld.entities.push({
                type: 'system', x: tx, y: ty,
                vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2,
                radius: 40, innerRadius: blueprintRadius,
                innerWorld: cloneWorld(blueprintWorld)
            });
        }
    } else {
        // UI manuale per livelli inferiori
        if (stable && !isZooming) zoomBtn.classList.add('visible');
        else zoomBtn.classList.remove('visible');
    }

    if (isDrawing && currentPath.length > 1) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(currentPath[0].x, currentPath[0].y);
        for(let i=1; i<currentPath.length; i+=2) ctx.lineTo(currentPath[i].x, currentPath[i].y);
        ctx.stroke();
    }

    drawWorld(ctx, currentWorld, 1);
requestAnimationFrame(animate);
}

// Inizializzazione (FUORI dalla funzione animate)
narrative.innerText = texts[0];
narrative.style.opacity = 1;

// Avvio del loop
requestAnimationFrame(animate);

</script>
</body>
</html>
